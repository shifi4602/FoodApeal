<div class="continer">
    <div class="filter">
        <div class="filter">
            <app-filter (filterChanged)="onFilterChanged($event)" [initialCategories]="urlCategories"></app-filter>
        </div>
    </div>
    <div class="container mt-4">
        <div class="row g-4">
            @for (product of filteredProducts; track product.Products_id){
            <div class="col-12 col-sm-6 col-lg-4 col-xl-3 d-flex">
                <p-card class="product-grid-card" (click)="goToProduct(product)">
                    <ng-template pTemplate="header">
                        <a [routerLink]="['/products-page', product.Products_id]" [state]="{ product: product }">
                            <img [src]="getImageUrl(product)"
                                 (error)="onImageError($event)"
                                 class="card-img-top" [alt]="product.Product_name">
                        </a>
                    </ng-template>
                    <div class="id">{{ product.Products_id }}</div>
                    <ng-template pTemplate="title">{{ product.Product_name }}</ng-template>
                    <ng-template pTemplate="subtitle"> ₪ {{ product.price }} </ng-template>
                    <ng-template pTemplate="footer">
                        <div class="d-flex gap-2 mt-1 m-2">
                            <a [routerLink]="['/basket']" class="flex-fill">
                                <p-button label="הוספה לסל" severity="secondary" [outlined]="true"
                                    styleClass="w-full" (onClick)="addToBasket(product)"/>
                            </a>
                            <!-- <a *ngIf="currentUser()?.isAdmin" [routerLink]="['/product-edit', product.Products_id]" class="flex-fill" (click)="$event.stopPropagation()">
                                <p-button label="עריכה" severity="warn" [outlined]="true" styleClass="w-full"/>
                            </a> -->
                        </div>
                    </ng-template>
                </p-card>
            </div>
            }
        </div>
    </div>
</div>
